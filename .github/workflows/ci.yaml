name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type check
        run: deno check packages/*/src
      - name: Test
        run: deno test --allow-read --allow-write --allow-env
